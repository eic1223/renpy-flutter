name: renpy_flutter
description: >
  A Flutter port of the Ren'Py visual novel engine.
  Parses .rpy scripts and renders them as interactive visual novels
  using Flutter widgets.
version: 0.1.0
homepage: https://github.com/eic1223/renpy-flutter

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
